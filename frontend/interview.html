<div style="position:fixed;inset:0;background:rgba(10,10,15,0.55);z-index:0;pointer-events:none;"></div>
<nav style="position:sticky;top:0;z-index:99999;background:linear-gradient(135deg,rgba(15,12,41,0.97),rgba(48,43,99,0.97));backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);"><div style="max-width:1280px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;"><a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;"><div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;">🚀</div><div><div style="color:white;font-weight:900;font-size:15px;line-height:1;">CareerPilot</div><div style="color:#818cf8;font-size:11px;font-weight:600;">AI</div></div></a><div style="display:flex;align-items:center;gap:2px;"><a href="/" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Home</a><a href="/resume.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Resume</a><a href="/roadmap.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Roadmap</a><a href="/interview.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Interview</a><a href="/courses.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Courses</a><a href="/jobs.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Jobs</a><a href="/chat.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">AI Chat</a></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0;"><div id="user-bar" style="display:none;align-items:center;gap:8px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);border-radius:10px;padding:6px 12px;"><img id="user-bar-avatar" style="width:24px;height:24px;border-radius:50%;object-fit:cover;display:none;" src=""/><span style="font-size:15px;">👤</span><a href="/profile.html" id="user-bar-name" style="color:#a5b4fc;font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;cursor:pointer;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'" style="color:#a5b4fc;font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></a><button onclick="fbSignOut()" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;">Sign Out</button></div><a id="nav-login-btn" href="/login.html" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;font-weight:600;font-size:13px;text-decoration:none;padding:7px 14px;border-radius:10px;">🔑 Sign In</a></div></div></nav>

<div class="max-w-4xl mx-auto px-4 py-12" style="position:relative;z-index:1;">
  <div class="mb-8">
    <div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#6366f1;margin-bottom:8px;">Interview Preparation</div>
    <h1 class="text-4xl font-black text-white mb-2">AI Interview Question Generator</h1>
    <p class="text-slate-400">Get role-specific technical, behavioral, and scenario questions with answer frameworks.</p>
  </div>

  <div class="card p-8 space-y-5">
    <div class="grid md:grid-cols-2 gap-5">
      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Target Role</label>
        <input id="iq-role" class="inp" placeholder="e.g. Frontend Developer, Data Analyst..."/>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Experience Level</label>
        <select id="iq-level" class="inp">
          <option>Entry-level</option><option selected>Mid-level</option>
          <option>Senior</option><option>Lead/Manager</option>
        </select>
      </div>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-400 mb-2">Key Skills (optional)</label>
      <input id="iq-skills" class="inp" placeholder="e.g. Python, React, AWS..."/>
    </div>
    <button onclick="generateQuestions()" class="btn w-full text-base">
      <span id="btn-text">ðŸŽ¯ Generate Interview Questions</span>
      <span id="btn-spin" class="hidden">â³ Generating questions...</span>
    </button>
    <div id="iq-result" class="hidden fade-up space-y-4"></div>
  </div>
</div>

<script>
const API="https://careerpilot-ai-gamma.vercel.app";
async function generateQuestions(){
  const role=document.getElementById('iq-role').value.trim();
  const level=document.getElementById('iq-level').value;
  const skills=document.getElementById('iq-skills').value.trim();
  if(!role)return alert('Please enter a target role.');
  document.getElementById('btn-text').classList.add('hidden'); document.getElementById('btn-spin').classList.remove('hidden');
  document.getElementById('iq-result').classList.add('hidden');
  try{
    const res=await fetch(`${API}/generate-questions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role,level,skills})});
    const d=await res.json(); if(d.error)throw new Error(d.error);
    const diffColor={Easy:'text-green-400',Medium:'text-yellow-400',Hard:'text-red-400'};
    let html='';
    if(d.technical?.length){
      html+=`<div class="text-xs text-indigo-400 font-bold uppercase tracking-wider mb-2">âš™ï¸ Technical Questions</div>`;
      html+=d.technical.map((q,i)=>`<div class="card p-4"><div class="flex items-start gap-3"><span class="text-indigo-400 font-black w-6">${i+1}.</span><div class="flex-1"><span class="text-xs font-bold ${diffColor[q.difficulty]||'text-slate-400'}">${q.difficulty||'Medium'}</span><div class="text-white text-sm font-medium my-1">${q.question}</div><details><summary class="text-xs text-indigo-400 cursor-pointer font-semibold">ðŸ’¡ What to look for</summary><div class="mt-2 text-xs text-slate-400 bg-indigo-500/5 border border-indigo-500/15 rounded-lg p-3">${q.hint}</div></details></div></div></div>`).join('');
    }
    if(d.behavioral?.length){
      html+=`<div class="text-xs text-green-400 font-bold uppercase tracking-wider mb-2 mt-4">ðŸ¤ Behavioral Questions</div>`;
      html+=d.behavioral.map((q,i)=>`<div class="card p-4"><div class="flex items-start gap-3"><span class="text-green-400 font-black w-6">${i+1}.</span><div class="flex-1"><span class="text-xs font-bold text-green-400 bg-green-500/10 px-2 py-0.5 rounded">${q.framework||'STAR'}</span><div class="text-white text-sm font-medium my-1">${q.question}</div><details><summary class="text-xs text-green-400 cursor-pointer font-semibold">ðŸ’¡ What to look for</summary><div class="mt-2 text-xs text-slate-400 bg-green-500/5 border border-green-500/15 rounded-lg p-3">${q.hint}</div></details></div></div></div>`).join('');
    }
    if(d.scenario?.length){
      html+=`<div class="text-xs text-yellow-400 font-bold uppercase tracking-wider mb-2 mt-4">ðŸŒ Real-World Scenarios</div>`;
      html+=d.scenario.map((q,i)=>`<div class="card p-4"><div class="flex items-start gap-3"><span class="text-yellow-400 font-black w-6">${i+1}.</span><div class="flex-1"><div class="text-xs text-yellow-400 font-semibold mb-1">ðŸ“ ${q.context||'Scenario'}</div><div class="text-white text-sm font-medium mb-1">${q.question}</div><details><summary class="text-xs text-yellow-400 cursor-pointer font-semibold">ðŸ’¡ Expected approach</summary><div class="mt-2 text-xs text-slate-400 bg-yellow-500/5 border border-yellow-500/15 rounded-lg p-3">${q.hint}</div></details></div></div></div>`).join('');
    }
    document.getElementById('iq-result').innerHTML=html;
    document.getElementById('iq-result').classList.remove('hidden');
  }catch(e){alert('Error: '+e.message);}
  finally{ document.getElementById('btn-text').classList.remove('hidden'); document.getElementById('btn-spin').classList.add('hidden'); }
}
</script>
<script>
(function(){
  // Picsum Photos - free, no API key, always works
  const IDS = [1015,1016,1018,1019,1020,1021,1022,1023,1024,1025,1026,1027,1028,1029,1030,1031,1032,1033,1035,1036];
  let i = Math.floor(Math.random() * IDS.length);
  function setBg(){
    const id = IDS[i % IDS.length];
    const url = 'https://picsum.photos/id/' + id + '/1600/900';
    let bgEl = document.getElementById('_bg');
    if(!bgEl){
      bgEl = document.createElement('div');
      bgEl.id = '_bg';
      bgEl.style.cssText = 'position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2.5s ease;pointer-events:none;filter:brightness(0.6) saturate(0.8);';
      document.body.prepend(bgEl);
    }
    const img = new Image();
    img.onload = function(){
      bgEl.style.backgroundImage = 'url(' + url + ')';
      bgEl.style.opacity = '0.18';
    };
    img.src = url;
    i++;
  }
  setBg();
  setInterval(function(){
    const el = document.getElementById('_bg');
    if(el){ el.style.opacity = '0'; setTimeout(setBg, 2500); }
  }, 18000);
})();
</script>
</body>

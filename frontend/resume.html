@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>

kground='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Interview</a><a href="/courses.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Courses</a><a href="/jobs.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Jobs</a><a href="/chat.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">AI Chat</a></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0;"><div id="user-bar" style="display:none;align-items:center;gap:8px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);border-radius:10px;padding:6px 12px;"><img id="user-bar-avatar" style="width:24px;height:24px;border-radius:50%;object-fit:cover;display:none;" src=""/><span style="font-size:15px;">👤</span><a href="/profile.html" id="user-bar-name" style="color:#a5b4fc;font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;cursor:pointer;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'" style="color:#a5b4fc;font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></a><button onclick="fbSignOut()" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;cursor:pointer;">Sign Out</button></div><a id="nav-login-btn" href="/login.html" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white;font-weight:600;font-size:13px;text-decoration:none;padding:7px 14px;border-radius:10px;">🔑 Sign In</a></div></div></nav>

<div class="max-w-4xl mx-auto px-4 py-12" style="position:relative;z-index:1;">
  <div class="mb-8">
    <div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#6366f1;margin-bottom:8px;">Resume Analyzer</div>
    <h1 class="text-4xl font-black text-white mb-2">Resume Score Engine</h1>
    <p class="text-slate-400">Upload your resume (PDF/PNG/JSON) or paste it. Get a detailed score breakdown across 6 categories.</p>
  </div>

  <div class="card p-8 space-y-6">
    <div class="grid md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Target Role</label>
        <input id="score-role" class="inp" placeholder="e.g. Software Developer, Data Scientist..."/>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-400 mb-2">Upload Resume</label>
        <label for="score-file" class="upload-zone block cursor-pointer">
          <input type="file" id="score-file" accept=".pdf,.json,.png,.jpg" class="hidden" onchange="handleFile(event)"/>
          <div id="file-ph"><svg width="32" height="32" fill="none" stroke="#6366f1" viewBox="0 0 24 24" style="margin:0 auto 8px;display:block;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg><div style="font-size:13px;color:#94a3b8;">PDF, JSON, PNG</div></div><div class="text-sm text-slate-400">PDF, JSON, PNG</div></div>
          <div id="file-sel" class="hidden"><div class="text-2xl mb-1">&#9989;</div><div id="file-name" class="text-sm text-indigo-400 font-semibold"></div></div>
        </label>
      </div>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-400 mb-2">Or paste resume text</label>
      <textarea id="score-resume" rows="6" class="inp resize-none" placeholder="Paste your resume here..."></textarea>
    </div>
    <button onclick="scoreResume()" class="btn w-full text-base">
      <span id="btn-text"><svg width="16" height="16" fill="none" stroke="white" viewBox="0 0 24 24" style="display:inline;margin-right:6px;vertical-align:middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Analyze & Score Resume</span>
      <span id="btn-spin" class="hidden">â³ Analyzing...</span>
    </button>

    <div id="score-result" class="hidden fade-up space-y-6">
      <div class="flex flex-col md:flex-row items-center gap-8 p-6 rounded-2xl" style="background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(139,92,246,0.1));border:1px solid rgba(99,102,241,0.2);">
        <div class="score-ring flex-shrink-0">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="58" fill="none" stroke="#1e1e2e" stroke-width="12"/>
            <circle id="score-circle" cx="70" cy="70" r="58" fill="none" stroke="url(#sg)" stroke-width="12" stroke-linecap="round" stroke-dasharray="364" stroke-dashoffset="364"/>
            <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
          </svg>
          <div class="score-num"><span id="score-num" class="text-4xl font-black text-white">0</span><span class="text-xs text-slate-400">/ 100</span></div>
        </div>
        <div class="flex-1">
          <div id="score-summary" class="text-slate-300 text-sm leading-relaxed mb-4"></div>
          <div class="grid grid-cols-2 gap-3">
            <div><div class="text-xs text-green-400 font-semibold mb-1">&#9989; Top Strengths</div><div id="score-strengths" class="text-xs text-slate-400 space-y-1"></div></div>
            <div><div class="text-xs text-red-400 font-semibold mb-1">âš ï¸ Critical Gaps</div><div id="score-gaps" class="text-xs text-slate-400 space-y-1"></div></div>
          </div>
        </div>
      </div>
      <div id="score-breakdown" class="grid md:grid-cols-2 gap-4"></div>
    </div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:5000";
let fileObj = null;
function handleFile(e){ fileObj=e.target.files[0]; if(!fileObj)return; document.getElementById('file-ph').classList.add('hidden'); document.getElementById('file-sel').classList.remove('hidden'); document.getElementById('file-name').textContent=fileObj.name; }
async function scoreResume(){
  const role=document.getElementById('score-role').value.trim()||'Software Developer';
  const resume=document.getElementById('score-resume').value.trim();
  if(!resume&&!fileObj)return alert('Please upload a resume or paste text.');
  document.getElementById('btn-text').classList.add('hidden'); document.getElementById('btn-spin').classList.remove('hidden');
  document.getElementById('score-result').classList.add('hidden');
  try{
    const form=new FormData(); form.append('target_role',role);
    if(fileObj)form.append('file',fileObj); else form.append('resume',resume);
    const res=await fetch(`${API}/score`,{method:'POST',body:form});
    const d=await res.json(); if(d.error)throw new Error(d.error);
    const pct=d.total_score/100; const offset=364-(364*pct);
    setTimeout(()=>{ document.getElementById('score-circle').style.strokeDashoffset=offset; document.getElementById('score-circle').style.transition='stroke-dashoffset 1.5s ease'; },100);
    let n=0; const iv=setInterval(()=>{ n=Math.min(n+2,d.total_score); document.getElementById('score-num').textContent=n; if(n>=d.total_score)clearInterval(iv); },20);
    document.getElementById('score-summary').textContent=d.summary||'';
    document.getElementById('score-strengths').innerHTML=(d.top_strengths||[]).map(s=>`<div>âœ“ ${s}</div>`).join('');
    document.getElementById('score-gaps').innerHTML=(d.critical_gaps||[]).map(g=>`<div>&#10007; ${g}</div>`).join('');
    const cats={keywords:'Keywords',experience:'Experience',education:'Education',skills:'Skills',formatting:'Formatting',achievements:'Achievements'};
    document.getElementById('score-breakdown').innerHTML=Object.entries(d.breakdown||{}).map(([k,v])=>`
      <div class="card p-4"><div class="flex justify-between mb-2"><span class="text-sm font-semibold text-slate-300">${cats[k]||k}</span><span class="text-indigo-400 font-bold text-sm">${v.score}/${v.max}</span></div>
      <div class="prog-bar mb-2"><div class="prog-fill" style="width:${(v.score/v.max)*100}%"></div></div>
      <div class="text-xs text-slate-500">${v.feedback}</div></div>`).join('');
    document.getElementById('score-result').classList.remove('hidden');
  }catch(e){alert('Error: '+e.message);}
  finally{ document.getElementById('btn-text').classList.remove('hidden'); document.getElementById('btn-spin').classList.add('hidden'); }
}
</script>
<script>
(function(){
  // Picsum Photos - free, no API key, always works
  const IDS = [1015,1016,1018,1019,1020,1021,1022,1023,1024,1025,1026,1027,1028,1029,1030,1031,1032,1033,1035,1036];
  let i = Math.floor(Math.random() * IDS.length);
  function setBg(){
    const id = IDS[i % IDS.length];
    const url = 'https://picsum.photos/id/' + id + '/1600/900';
    let bgEl = document.getElementById('_bg');
    if(!bgEl){
      bgEl = document.createElement('div');
      bgEl.id = '_bg';
      bgEl.style.cssText = 'position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2.5s ease;pointer-events:none;filter:brightness(0.6) saturate(0.8);';
      document.body.prepend(bgEl);
    }
    const img = new Image();
    img.onload = function(){
      bgEl.style.backgroundImage = 'url(' + url + ')';
      bgEl.style.opacity = '0.18';
    };
    img.src = url;
    i++;
  }
  setBg();
  setInterval(function(){
    const el = document.getElementById('_bg');
    if(el){ el.style.opacity = '0'; setTimeout(setBg, 2500); }
  }, 18000);
})();
</script>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import{getFirestore,collection,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getStorage,ref,uploadBytes,getDownloadURL}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
const fbApp=initializeApp({apiKey:"AIzaSyAAQ4YStcuTEp4E4qQoA3Sfms4UGyJyjbY",authDomain:"resume-analyzer-com.firebaseapp.com",projectId:"resume-analyzer-com",storageBucket:"resume-analyzer-com.firebasestorage.app",messagingSenderId:"1065048610992",appId:"1:1065048610992:web:3de45568615994b048c375"});
const auth=getAuth(fbApp),db=getFirestore(fbApp),storage=getStorage(fbApp);
let currentUser=null;
onAuthStateChanged(auth,u=>{currentUser=u;if(u){document.getElementById('user-bar').style.display='flex';document.getElementById('user-name').textContent=u.displayName||u.email;}});
window.saveScoreToFirebase=async(scoreData,role)=>{
  if(!currentUser){console.log('Not logged in, score not saved');return;}
  try{
    // Save score to Firestore
    await addDoc(collection(db,'users',currentUser.uid,'scores'),{
      role,score:scoreData.total_score,summary:scoreData.summary,
      strengths:scoreData.top_strengths,gaps:scoreData.critical_gaps,
      breakdown:scoreData.breakdown,createdAt:serverTimestamp()
    });
    // Upload resume file to Storage if exists
    const fileInput=document.getElementById('score-file');
    if(fileInput&&fileInput.files[0]){
      const file=fileInput.files[0];
      const storageRef=ref(storage,`resumes/${currentUser.uid}/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef,file);
      const url=await getDownloadURL(storageRef);
      console.log('Resume uploaded:',url);
    }
    showSaveToast('✅ Score saved to your profile!');
  }catch(e){console.error('Firebase save error:',e);}
};
window.showSaveToast=msg=>{
  let t=document.getElementById('save-toast');
  if(!t){t=document.createElement('div');t.id='save-toast';t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:99999;background:linear-gradient(135deg,#10b981,#059669);color:white;font-weight:700;font-size:13px;padding:12px 20px;border-radius:14px;box-shadow:0 8px 32px rgba(16,185,129,0.4);transform:translateY(80px);transition:transform 0.4s ease;';document.body.appendChild(t);}
  t.textContent=msg;t.style.transform='translateY(0)';
  setTimeout(()=>t.style.transform='translateY(80px)',3000);
};
</script>

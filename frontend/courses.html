<nav style="position:sticky;top:0;z-index:99999;background:linear-gradient(135deg,rgba(15,12,41,0.97),rgba(48,43,99,0.97));backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);"><div style="max-width:1280px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;"><a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;"><div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;">🚀</div><div><div style="color:white;font-weight:900;font-size:15px;line-height:1;">CareerPilot</div><div style="color:#818cf8;font-size:11px;font-weight:600;">AI</div></div></a><div style="display:flex;align-items:center;gap:2px;"><a href="/" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Home</a><a href="/resume.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Resume</a><a href="/roadmap.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Roadmap</a><a href="/interview.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Interview</a><a href="/courses.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Courses</a><a href="/jobs.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">Jobs</a><a href="/chat.html" style="color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;padding:7px 11px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)';this.style.color='white'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.7)'">AI Chat</a></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0;"><div id="user-bar" style="display:none;align-items:center;gap:8px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);border-radius:10px;padding:6px 12px;"><img id="user-bar-avatar" style="width:24px;height:24px;border-radius:50%;object-fit:cover;display:none;" src=""/><span style="font-size:15px;">👤</span><a href="/profile.html" id="user-bar-name" style="color:#a5b4fc;font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;cursor:pointer;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'" style="color:#a5b4fc;font-size:13px;font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></a><button <div class="max-w-4xl mx-auto px-4 py-12" style="position:relative;z-index:1;">
  <div class="mb-8">
    <div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#6366f1;margin-bottom:8px;">Learning Path</div>
    <h1 class="text-4xl font-black text-white mb-2">Course Recommendations</h1>
    <p class="text-slate-400">Get curated courses and certifications tailored to your skill gaps and target role.</p>
  </div>

  <div class="card p-8 space-y-5">
    <div>
      <label class="block text-sm font-semibold text-slate-400 mb-2">Target Role</label>
      <input id="course-role" class="inp" placeholder="e.g. Data Scientist, Cloud Engineer..."/>
    </div>
    <div>
      <label class="block text-sm font-semibold text-slate-400 mb-2">Skill Gaps (comma separated)</label>
      <input id="course-gaps" class="inp" placeholder="e.g. Python, Machine Learning, Docker, Kubernetes..."/>
    </div>
    <button onclick="getCourses()" class="btn w-full text-base">
      <span id="btn-text">ðŸ“š Get Course Recommendations</span>
      <span id="btn-spin" class="hidden">â³ Finding courses...</span>
    </button>
    <div id="course-result" class="hidden fade-up grid md:grid-cols-2 gap-4"></div>
  </div>
</div>

<script>
const API="http://127.0.0.1:5000";
async function getCourses(){
  const role=document.getElementById('course-role').value.trim();
  const gaps=document.getElementById('course-gaps').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  if(!role)return alert('Please enter a target role.');
  document.getElementById('btn-text').classList.add('hidden'); document.getElementById('btn-spin').classList.remove('hidden');
  document.getElementById('course-result').classList.add('hidden');
  try{
    const res=await fetch(`${API}/courses`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target_role:role,skill_gaps:gaps})});
    const d=await res.json(); if(d.error)throw new Error(d.error);
    const priColor={High:'text-red-400',Medium:'text-yellow-400',Low:'text-green-400'};
    const lvlColor={Beginner:'text-green-400',Intermediate:'text-yellow-400',Advanced:'text-red-400'};
    document.getElementById('course-result').innerHTML=(d.courses||[]).map(c=>`
      <div class="card p-5 space-y-3">
        <div class="flex items-start justify-between gap-2">
          <div class="font-bold text-white text-sm leading-tight">${c.title}</div>
          <span class="text-xs font-bold ${priColor[c.priority]||'text-slate-400'} flex-shrink-0">${c.priority}</span>
        </div>
        <div class="flex flex-wrap gap-2">
          <span style="background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">${c.platform}</span>
          <span class="text-xs ${lvlColor[c.level]||'text-slate-400'} font-semibold">${c.level}</span>
          <span class="text-xs text-slate-500">â± ${c.duration}</span>
        </div>
        <div class="text-xs text-slate-400">Covers: <span class="text-indigo-400">${c.skill}</span></div>
        <div class="text-xs text-slate-500 italic">Search: "${c.url_hint}"</div>
      </div>`).join('');
    document.getElementById('course-result').classList.remove('hidden');
  }catch(e){alert('Error: '+e.message);}
  finally{ document.getElementById('btn-text').classList.remove('hidden'); document.getElementById('btn-spin').classList.add('hidden'); }
}
</script>
<script>
(function(){
  // Picsum Photos - free, no API key, always works
  const IDS = [1015,1016,1018,1019,1020,1021,1022,1023,1024,1025,1026,1027,1028,1029,1030,1031,1032,1033,1035,1036];
  let i = Math.floor(Math.random() * IDS.length);
  function setBg(){
    const id = IDS[i % IDS.length];
    const url = 'https://picsum.photos/id/' + id + '/1600/900';
    let bgEl = document.getElementById('_bg');
    if(!bgEl){
      bgEl = document.createElement('div');
      bgEl.id = '_bg';
      bgEl.style.cssText = 'position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity 2.5s ease;pointer-events:none;filter:brightness(0.6) saturate(0.8);';
      document.body.prepend(bgEl);
    }
    const img = new Image();
    img.onload = function(){
      bgEl.style.backgroundImage = 'url(' + url + ')';
      bgEl.style.opacity = '0.18';
    };
    img.src = url;
    i++;
  }
  setBg();
  setInterval(function(){
    const el = document.getElementById('_bg');
    if(el){ el.style.opacity = '0'; setTimeout(setBg, 2500); }
  }, 18000);
})();
</script>
